<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master en Cuentas Contables</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        .category { color: #2ecc71; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        h1 { font-size: 1.4rem; color: #2c3e50; margin: 1rem 0; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: border 0.3s; }
        input:focus { border-color: #3498db; }
        .btn { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; margin-top: 1rem; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn:hover { background: #2980b9; }
        .feedback { margin-top: 1rem; font-weight: bold; min-height: 24px; }
        .score { margin-top: 2rem; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="category" id="group-label">Nivel 1: Activo Corriente</div>
    <h1 id="question">Cargando...</h1>
    <input type="text" id="answer-input" placeholder="Escribe el nombre de la cuenta..." autocomplete="off">
    <button class="btn" onclick="checkAnswer()">Comprobar</button>
    <div class="feedback" id="feedback"></div>
    <div class="score">Puntaje: <span id="points">0</span></div>
</div>

<script>
    const questions = [
        { q: "Representa billetes, monedas y cheques recibidos propiedad de la empresa.", a: "Caja" },
        { q: "Fondo fijo de dinero para cubrir gastos menores y pequeños.", a: "Caja chica" },
        { q: "Valor de los depósitos en cuentas de cheques y ahorros en instituciones bancarias.", a: "Bancos" },
        { q: "Personas que deben a la empresa por venta de mercadería al crédito (factura).", a: "Clientes" },
        { q: "Títulos de crédito a favor de la empresa como Letras de Cambio o Pagarés.", a: "Documentos por cobrar" },
        { q: "Personas que deben a la empresa por conceptos distintos a la venta de mercaderías.", a: "Deudores varios" }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        document.getElementById('question').innerText = questions[currentQ].q;
        document.getElementById('answer-input').value = "";
        document.getElementById('feedback').innerText = "";
    }

    function checkAnswer() {
        const userAns = document.getElementById('answer-input').value.trim().toLowerCase();
        const correctAns = questions[currentQ].a.toLowerCase();

        if (userAns === correctAns) {
            score++;
            document.getElementById('feedback').style.color = "#2ecc71";
            document.getElementById('feedback').innerText = "¡Correcto! ✓";
            currentQ = (currentQ + 1) % questions.length;
            setTimeout(loadQuestion, 1200);
        } else {
            document.getElementById('feedback').style.color = "#e74c3c";
            document.getElementById('feedback').innerText = "Intenta de nuevo ✗";
        }
        document.getElementById('points').innerText = score;
    }

    // Iniciar con Enter
    document.getElementById('answer-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });

    loadQuestion();
</script>

</body>
</html>
