<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Contable: 60 Cuentas</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .game-container { background: #16213e; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #0f3460; }
        .stats { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 15px; color: #4ecca3; }
        .progress-bg { background: #0f3460; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { background: #4ecca3; height: 100%; width: 0%; transition: 0.3s; }
        h2 { font-size: 1.1rem; min-height: 80px; margin-bottom: 20px; line-height: 1.5; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #4ecca3; color: #1a1a2e; font-weight: bold; font-size: 1rem; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .feedback { margin-top: 15px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats">
        <span id="counter">Pregunta 1/60</span>
        <span id="score">Puntos: 0</span>
    </div>
    <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
    <h2 id="question">Cargando cuentas...</h2>
    <input type="text" id="answer" placeholder="Escribe el nombre aquí..." autocomplete="off">
    <button onclick="check()">VERIFICAR</button>
    <div class="feedback" id="msg"></div>
</div>

<script>
    const db = [
        {q: "Dinero en efectivo, billetes y monedas.", a: "Caja"},
        {q: "Fondo para gastos menores y urgentes.", a: "Caja chica"},
        {q: "Dinero en cuentas de cheques o ahorros.", a: "Bancos"},
        {q: "Inversiones en bonos de inmediata recuperación.", a: "Inversiones en bonos"},
        {q: "Personas que deben por venta de mercadería al crédito.", a: "Clientes"},
        {q: "Letras o pagarés a favor del negocio.", a: "Documentos por cobrar"},
        {q: "Personas que deben por algo que no es mercadería.", a: "Deudores varios"},
        {q: "Intereses ganados aún no cobrados.", a: "Intereses por cobrar"},
        {q: "Impuesto pagado en las compras (ISV).", a: "Impuesto sobre ventas pagado"},
        {q: "Mercancías destinadas para la venta.", a: "Inventarios"},
        {q: "Papel, lápices y útiles de oficina.", a: "Papeleria y utiles"},
        {q: "Artículos de limpieza para el local.", a: "Material de aseo"},
        {q: "Bolsas y cajas para el producto.", a: "Material de empaque"},
        {q: "Pagos por anuncios en radio o prensa.", a: "Propaganda y publicidad"},
        {q: "Pagos a aseguradoras por protección.", a: "Primas de seguro"},
        {q: "Alquiler pagado por adelantado.", a: "Rentas pagadas por anticipado"},
        {q: "Intereses pagados antes de vencer.", a: "Intereses pagados por anticipado"},
        {q: "Lotes de tierra propiedad del negocio.", a: "Terrenos"},
        {q: "Locales o edificios de la empresa.", a: "Edificios"},
        {q: "Escritorios, sillas y vitrinas.", a: "Mobiliario y equipo"},
        {q: "Computadoras e impresoras.", a: "Equipo de computo"},
        {q: "Carros o motos de la empresa.", a: "Equipo de transporte"},
        {q: "Maquinaria pesada de producción.", a: "Maquinaria"},
        {q: "Dinero entregado para asegurar un servicio.", a: "Depositos en garantia"},
        {q: "Gastos por trámites legales de la empresa.", a: "Gastos de organizacion"},
        {q: "Gastos por instalación de equipo.", a: "Gastos de instalacion"},
        {q: "Deudas por compra de mercadería al crédito.", a: "Proveedores"},
        {q: "Letras o pagarés a nuestro cargo.", a: "Documentos por pagar"},
        {q: "Deudas por conceptos ajenos a la mercadería.", a: "Acreedores varios"},
        {q: "Préstamos bancarios a corto plazo.", a: "Prestamos bancarios"},
        {q: "Sueldos no pagados a los empleados.", a: "Sueldos y salarios por pagar"},
        {q: "Impuestos pendientes de pago.", a: "Impuestos por pagar"},
        {q: "Intereses que debemos y no hemos pagado.", a: "Intereses por pagar"},
        {q: "Agua o luz no pagada.", a: "Servicios publicos por pagar"},
        {q: "Alquileres cobrados por adelantado.", a: "Rentas cobradas por anticipado"},
        {q: "Intereses cobrados por adelantado.", a: "Intereses cobrados por anticipado"},
        {q: "Préstamos bancarios a más de un año.", a: "Prestamos bancarios a largo plazo"},
        {q: "Deudas con garantía de escrituras.", a: "Hipotecas por pagar"},
        {q: "Aportaciones de los dueños.", a: "Capital social"},
        {q: "Ganancias de años anteriores.", a: "Utilidades acumuladas"},
        {q: "Ganancia neta del año actual.", a: "Utilidad del ejercicio"},
        {q: "Pérdida neta del año actual.", a: "Perdida del ejercicio"},
        {q: "Reserva exigida por la ley.", a: "Reserva legal"},
        {q: "Ingresos por venta de productos.", a: "Ventas"},
        {q: "Valor de las mercancías compradas.", a: "Compras"},
        {q: "Fletes de la mercadería comprada.", a: "Gastos sobre compras"},
        {q: "Gastos del área de ventas.", a: "Gastos de venta"},
        {q: "Gastos del área administrativa.", a: "Gastos de administracion"},
        {q: "Gastos por intereses o comisiones.", a: "Gastos financieros"},
        {q: "Ganancia por intereses o cambios.", a: "Productos financieros"},
        {q: "Multas o gastos no comunes.", a: "Otros gastos"},
        {q: "Ingresos no comunes.", a: "Otros productos"},
        {q: "Costo de lo que se vendió.", a: "Costo de ventas"},
        {q: "Mercancía devuelta por clientes.", a: "Devoluciones sobre ventas"},
        {q: "Rebaja concedida a clientes.", a: "Rebajas sobre ventas"},
        {q: "Mercancía devuelta a proveedores.", a: "Devoluciones sobre compras"},
        {q: "Rebaja que nos da el proveedor.", a: "Rebajas sobre compras"},
        {q: "Descuento a clientes por pronto pago.", a: "Descuentos sobre ventas"},
        {q: "Descuento de proveedores por pronto pago.", a: "Descuentos sobre compras"},
        {q: "Impuesto cobrado en las ventas (ISV).", a: "Impuesto sobre ventas cobrado"}
    ];

    let game = [], idx = 0, pts = 0;

    function start() {
        game = [...db].sort(() => Math.random() - 0.5);
        show();
    }

    function show() {
        if(idx < game.length) {
            document.getElementById('question').innerText = game[idx].q;
            document.getElementById('counter').innerText = `Pregunta ${idx + 1}/${game.length}`;
            document.getElementById('bar').style.width = `${(idx/game.length)*100}%`;
            document.getElementById('answer').value = "";
            document.getElementById('msg').innerText = "";
        } else {
            document.getElementById('question').innerText = "¡FELICIDADES! DOMINAS LAS 60 CUENTAS.";
        }
    }

    function check() {
        let u = document.getElementById('answer').value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        let a = game[idx].a.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if(u === a) {
            pts++;
            document.getElementById('score').innerText = `Puntos: ${pts}`;
            document.getElementById('msg').innerText = "¡CORRECTO!";
            document.getElementById('msg').style.color = "#4ecca3";
            idx++;
            setTimeout(show, 600);
        } else {
            document.getElementById('msg').innerText = "ERROR - Revisa el nombre";
            document.getElementById('msg').style.color = "#ff4d4d";
        }
    }

    document.getElementById('answer').addEventListener('keypress', (e) => { if(e.key === 'Enter') check(); });
    start();
</script>
</body>
</html>
